name: gelidonyamr
channels:
  - bioconda
  - conda-forge
  - defaults

dependencies:
  - python=3.9

  # ── Workflow Engine ──────────────────────────────────────────────────────
  - nextflow>=23.10.0

  # ── SRA İndirme ──────────────────────────────────────────────────────────
  - sra-tools>=3.0.0            # prefetch + fasterq-dump

  # ── Kalite Kontrol ───────────────────────────────────────────────────────
  - fastqc=0.12.1
  - fastp=0.24.0
  - multiqc=1.27
  - kraken2=2.1.3

  # ── Assembly ─────────────────────────────────────────────────────────────
  - flye=2.9

  # ── Polishing ────────────────────────────────────────────────────────────
  - minimap2>=2.26
  - racon>=1.5.0
  - samtools>=1.18            # clair3 için gerekli

  # ── Assembly QC ──────────────────────────────────────────────────────────
  - quast=5.3.0
  - busco=5.7.1
  - checkm-genome>=1.2.2
  - fastani>=1.34

  # ── Varyant Çağırma ───────────────────────────────────────────────────────
  - clair3>=1.0.4
  - snpeff>=5.2

  # ── Anotasyon ────────────────────────────────────────────────────────────
  - prokka>=1.14
  - bakta>=1.9.3

  # ── AMR Analizi ──────────────────────────────────────────────────────────
  - abricate=1.0.1
  - ncbi-amrfinder>=3.12

  # ── Plazmid Analizi ───────────────────────────────────────────────────────
  - mob_suite>=3.1.0
  - plasmidfinder>=2.1.6

  # ── Moleküler Tipleme ─────────────────────────────────────────────────────
  - mlst=2.23.0
  - chewbbaca=3.3.6

  # ── Filogeni ─────────────────────────────────────────────────────────────
  - roary>=3.13.0
  - iqtree2>=2.3.0
  - parsnp>=2.0.3
  - poppunk>=2.6.0
